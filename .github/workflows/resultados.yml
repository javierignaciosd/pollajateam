name: Actualizar resultados Mundial

on:
  schedule:
    - cron: "*/20 * * * *"   # cada 20 minutos (UTC)
  workflow_dispatch:          # botón para correrlo a mano

concurrency:
  group: actualizar-resultados-mundial
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Actualizar resultados en Firebase
        env:
          FD_TOKEN: ${{ secrets.FD_TOKEN }}
        run: python update_results.py
