name: Actualizar resultados Mundial

on:
  workflow_dispatch:

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ejecutar actualización
        env:
          FD_TOKEN: ${{ secrets.FD_TOKEN }}
        run: python update_results.py
