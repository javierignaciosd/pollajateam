name: Actualizar resultados Mundial

on:
  workflow_dispatch:

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ejecutar actualización de resultados y marcador vivo
        env:
          FD_TOKEN: ${{ secrets.FD_TOKEN }}
        run: python update_results.py

      - name: Ejecutar actualización de cuotas Odds-API.io
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_BOOKMAKERS: ${{ vars.ODDS_BOOKMAKERS }}
        run: |
          if [ -z "$ODDS_API_KEY" ]; then
            echo "ODDS_API_KEY no configurado. Se omite actualización de cuotas."
            exit 0
          fi
          if [ -z "$ODDS_BOOKMAKERS" ]; then
            export ODDS_BOOKMAKERS="Bet365,Unibet,SingBet,Pinnacle,Betfair"
          fi
          python update_odds.py
