name: Actualizar resultados Mundial

on:
  schedule:
    - cron: "*/20 * * * *"   # cada 20 minutos
  workflow_dispatch:          # boton para correrlo a mano

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Actualizar resultados
        env:
          FD_TOKEN: ${{ secrets.FD_TOKEN }}
        run: python update_results.py
